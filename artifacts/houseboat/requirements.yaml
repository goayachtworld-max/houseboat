packages:
  "framer-motion": "For elegant, premium page transitions and scroll animations matching a luxury resort feel"
  "react-hook-form": "For complex form state management in admin and guest inquiry/blog submissions"
  "@hookform/resolvers": "To use Zod schemas with react-hook-form"
  "date-fns": "For formatting blog post and gallery dates beautifully"
  "clsx": "For conditional class names in UI components"
  "tailwind-merge": "For merging tailwind classes safely in UI components"

